<!DOCTYPE html>
<html>
<head>
    <title>Stock Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            color: #38bdf8;
            font-size: 22px;
            font-weight: bold;
        }

	

        .container {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            background: #020617;
            padding: 20px;
            border-radius: 12px;
        }

        .main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
        }

        input, select {
            background: #1e293b;
            color: white;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            font-weight: bold;
            cursor: pointer;
        }

        #suggestions {
            background: #1e293b;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
        }

        #suggestions div {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
        }

        #suggestions div:hover {
            background: #334155;
        }

        /* 🔥 CARD UI */
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h4 {
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        .card div {
            font-size: 24px;
        }

        .signal-card {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .volatility-card {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        .prediction-card {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }

        canvas {
            height: 400px !important;
            background: #020617;
            border-radius: 12px;
            padding: 10px;
        }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>📊 Stock Intelligence Dashboard</header>

<div class="container">

    <div class="sidebar">
        <h3>Select Options</h3>

        <!-- 🔍 Search -->
        <input type="text" id="searchBox" placeholder="Search stock..." onkeyup="searchStock()">
        <div id="suggestions"></div>

        <select id="rangeSelect">
            <option value="30">Last 30 Days</option>
            <option value="90">Last 90 Days</option>
        </select>

        <select id="compareSelect">
            <option value="">Compare Stock</option>
            <option value="TCS">TCS</option>
            <option value="INFY">INFY</option>
            <option value="RELIANCE">RELIANCE</option>
        </select>

        <button onclick="loadSelectedStock()">Analyze</button>
    </div>

    <div class="main">

        <div class="metrics">

		<div class="card">
    <h4>📉 52W High</h4>
    <div id="highBox">--</div>
</div>

<div class="card">
    <h4>📈 52W Low</h4>
    <div id="lowBox">--</div>
</div>
            <div class="card signal-card">
                <h4>📈 Signal</h4>
                <div id="signalBox">--</div>
            </div>
		<div class="card">
    <h4>📉 Daily Return</h4>
    <div id="returnBox">--</div>
</div>

            <div class="card volatility-card">
                <h4>📊 Volatility</h4>
                <div id="volBox">--</div>
            </div>

            <div class="card prediction-card">
                <h4>💰 Prediction</h4>
                <div id="predictionBox">--</div>
            </div>
        </div>

        <canvas id="chart"></canvas>

    </div>

</div>

<script>
const API = "http://127.0.0.1:8000";

let chart;
let selectedStock = "";

// 🔍 SEARCH
async function searchStock() {
    const query = document.getElementById("searchBox").value;

    if (!query || query.length < 1) {
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    const res = await fetch(`${API}/search?query=${encodeURIComponent(query)}`);
    const data = await res.json();

    const suggestions = document.getElementById("suggestions");
    suggestions.innerHTML = "";

    data.forEach(stock => {
        const symbol = stock.symbol || stock.Symbol;
        const name = stock.name || stock.Name;

        const div = document.createElement("div");
        div.textContent = `${symbol} - ${name}`;

        div.addEventListener("click", () => selectStock(symbol));

        suggestions.appendChild(div);
    });
}

function selectStock(symbol) {
    selectedStock = symbol;

    document.getElementById("searchBox").value = symbol;
    document.getElementById("suggestions").innerHTML = "";
}

// 🚀 LOAD DATA
async function loadSelectedStock() {
    if (!selectedStock) {
        alert("Select stock first");
        return;
    }

    const range = document.getElementById("rangeSelect").value;
    const compare = document.getElementById("compareSelect").value;

    let res = await fetch(`${API}/data/${selectedStock}?days=${range}`);
    let data = await res.json();

    if (!data.length) return;

    const labels = data.map(d => d.Date.split("T")[0]);
    const prices = data.map(d => d.Close);

    let datasets = [{
        label: selectedStock,
        data: prices,
        borderColor: "#60a5fa",
        tension: 0.3
    }];

    if (compare && compare !== selectedStock) {
        let res2 = await fetch(`${API}/data/${compare}?days=${range}`);
        let data2 = await res2.json();

        datasets.push({
            label: compare,
            data: data2.map(d => d.Close),
            borderColor: "#4ade80"
        });
    }

    const pred = await (await fetch(`${API}/predict/${selectedStock}`)).json();

    datasets.push({
        label: "Prediction",
        data: [...prices, pred.predicted_price],
        borderColor: "#f87171",
        borderDash: [5,5]
    });
	datasets.push({
    label: "MA7",
    data: data.map(d => d.MA7),
    borderColor: "#facc15",
    borderDash: [4,4],
    tension: 0.3
});

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: [...labels, "Next"],
            datasets: datasets
        }
    });

    const insight = await (await fetch(`${API}/insights/${selectedStock}`)).json();

    let color = "#eab308";
    if (insight.signal === "BUY") color = "#22c55e";
    if (insight.signal === "SELL") color = "#ef4444";

const last = data[data.length - 1];

document.getElementById("highBox").innerHTML =
    (last["52W_High"] !== undefined && last["52W_High"] !== null)
        ? `₹${last["52W_High"].toFixed(2)}`
        : "--";

document.getElementById("lowBox").innerHTML =
    (last["52W_Low"] !== undefined && last["52W_Low"] !== null)
        ? `₹${last["52W_Low"].toFixed(2)}`
        : "--";

    document.getElementById("signalBox").innerHTML =
        `<span style="color:${color}">${insight.signal}</span>`;

    document.getElementById("volBox").innerHTML =
        `${insight.volatility_score.toFixed(2)}%`;

    document.getElementById("predictionBox").innerHTML =
        `₹${pred.predicted_price.toFixed(2)}`;
	document.getElementById("returnBox").innerHTML =
    `${(last["Daily Return"] * 100).toFixed(2)}%`;
}
</script>

</body>
</html>
